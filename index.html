<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMSA لمسة — رشمات حناء ملكية | Royal Henna Art</title>
<meta name="description" content="LAMSA لمسة — رشمات حناء طبيعية 100%، أطقم عروس، استنسل، وعناية ما بعد الحناء. صنع بحب.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Marcellus&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LAMSA — لمسة | Design tokens
   Palette: cream parchment + deep henna brown + antique gold
   Type: Aref Ruqaa (AR display / calligraphic) + Amiri (AR body)
         Cormorant Garamond (EN display/body) + Marcellus (EN eyebrow)
   Signature: hand-drawn paisley "henna vine" dividers + medallion
   product frames, echoing the winding line of a henna cone.
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FBF3E4;
  --cream2:#F3E2C4;
  --paper:#FFFBF3;
  --brown-900:#2A160D;
  --brown-800:#3C2113;
  --brown-700:#4E2C18;
  --brown-600:#6B3F22;
  --brown-400:#9C7248;
  --maroon:#5C2117;
  --gold:#C9A24B;
  --gold-light:#E8CE8E;
  --gold-dark:#8C6A24;
  --ink:#2A160D;
  --ease:cubic-bezier(.23,1,.32,1);
  --ease2:cubic-bezier(.16,1,.3,1);
  --f-ar-disp:'Aref Ruqaa',serif;
  --f-ar-body:'Amiri',serif;
  --f-en-disp:'Cormorant Garamond',serif;
  --f-en-eyebrow:'Marcellus',serif;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--cream);color:var(--ink);overflow-x:hidden;cursor:none;transition:background .3s}
body.lang-ar{font-family:var(--f-ar-body)}
body.lang-en{font-family:var(--f-en-disp)}
[dir="ltr"] body{letter-spacing:.01em}

/* language-aware display font helper */
.disp{font-family:var(--f-ar-disp)}
body.lang-en .disp{font-family:var(--f-en-disp);font-weight:600}
.eyebrow{font-family:var(--f-ar-body);font-weight:700}
body.lang-en .eyebrow{font-family:var(--f-en-eyebrow);font-weight:400;letter-spacing:.14em;text-transform:uppercase}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,width .3s var(--ease),height .3s var(--ease),opacity .3s}
#cursor-ring{position:fixed;width:34px;height:34px;border:1.5px solid rgba(201,162,75,.55);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s var(--ease),width .4s var(--ease),height .4s var(--ease),border-color .3s}
@media(hover:none){#cursor,#cursor-ring{display:none}body{cursor:auto}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

#prog{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));z-index:10000;width:0%;transition:width .06s linear;box-shadow:0 0 8px var(--gold)}

/* ANNOUNCEMENT BAR */
.ann{background:var(--brown-900);color:var(--gold-light);text-align:center;font-size:.78rem;font-weight:600;padding:9px 16px;letter-spacing:.03em;position:relative;z-index:900}
body.lang-en .ann{font-family:var(--f-en-eyebrow);text-transform:uppercase;letter-spacing:.12em}

/* NAV */
nav{position:sticky;top:0;inset-inline:0;z-index:800;padding:18px 0;background:rgba(251,243,228,.9);backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid rgba(201,162,75,.18);transition:.4s var(--ease)}
nav.s{padding:12px 0;box-shadow:0 8px 30px rgba(42,22,13,.06)}
.nc{max-width:1360px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(92,33,23,.25))}
.logo-txt{font-family:var(--f-ar-disp);font-size:1.5rem;font-weight:700;color:var(--maroon);letter-spacing:.02em}
body.lang-en .logo-txt{font-family:var(--f-en-eyebrow);letter-spacing:.22em;font-size:1.25rem}
.nl{display:flex;gap:30px}
.nl a{text-decoration:none;font-size:.88rem;font-weight:600;color:var(--brown-600);transition:.25s;position:relative}
.nl a::after{content:'';position:absolute;bottom:-6px;inset-inline:0;height:1px;background:var(--gold);transform:scaleX(0);transition:.3s var(--ease);transform-origin:center}
.nl a:hover{color:var(--maroon)}
.nl a:hover::after{transform:scaleX(1)}
.nb{display:flex;align-items:center;gap:10px}
.langtog{display:flex;border:1px solid rgba(140,106,36,.35);border-radius:50px;overflow:hidden;font-size:.72rem;font-weight:800}
.langtog button{padding:7px 14px;background:transparent;border:none;color:var(--brown-600);cursor:none;font-family:'Marcellus',serif;letter-spacing:.05em;transition:.25s}
.langtog button.on{background:var(--maroon);color:var(--gold-light)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:50px;font-weight:700;font-size:.85rem;cursor:none;transition:.35s var(--ease);border:1px solid transparent;text-decoration:none;white-space:nowrap;position:relative;overflow:hidden;font-family:inherit}
.btn-ghost{background:transparent;color:var(--maroon);border-color:rgba(92,33,23,.3)}
.btn-ghost:hover{background:rgba(92,33,23,.06);border-color:var(--maroon)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--brown-900);font-weight:800;box-shadow:0 8px 22px rgba(140,106,36,.28)}
.btn-gold:hover{box-shadow:0 12px 32px rgba(140,106,36,.42);transform:translateY(-2px)}
.btn-cart{background:var(--maroon);color:var(--gold-light);font-weight:800}
.btn-cart:hover{background:var(--brown-900);transform:translateY(-2px)}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none}
.ham span{display:block;width:24px;height:1.5px;background:var(--brown-700)}
@media(max-width:960px){.nl{display:none}.nb .btn-ghost{display:none}.ham{display:flex}}

.mob{position:fixed;inset:0;background:rgba(42,22,13,.97);backdrop-filter:blur(20px);z-index:750;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;transform:translateX(105%);transition:.5s var(--ease)}
[dir="rtl"] .mob{transform:translateX(-105%)}
.mob.open{transform:none}
.mob a{color:var(--cream);text-decoration:none;font-size:1.3rem;font-weight:700}
.mob .btn{width:200px;justify-content:center}

/* HERO */
.hero{position:relative;min-height:92vh;display:flex;align-items:center;overflow:hidden;padding:60px 0 40px}
.hero::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 50% at 85% 10%,rgba(201,162,75,.16),transparent 60%),
  radial-gradient(ellipse 50% 60% at 10% 90%,rgba(92,33,23,.09),transparent 60%),
  linear-gradient(160deg,var(--cream) 0%,var(--cream2) 55%,var(--cream) 100%);
  z-index:0}
#dust-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.hero-inner{position:relative;z-index:2;max-width:1360px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center}
@media(max-width:960px){.hero-inner{grid-template-columns:1fr;text-align:center}}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(201,162,75,.12);border:1px solid rgba(201,162,75,.4);padding:8px 20px;border-radius:50px;font-size:.76rem;font-weight:700;color:var(--gold-dark);margin-bottom:26px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold-dark)}
.hero h1{font-family:var(--f-ar-disp);font-size:clamp(2.6rem,5.6vw,4.6rem);line-height:1.25;color:var(--maroon);margin-bottom:14px}
body.lang-en .hero h1{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.hero h1 span{display:block;color:var(--brown-900);font-size:.5em;font-weight:700;font-family:inherit;margin-top:8px;font-style:normal}
.hero-desc{font-size:1.02rem;color:var(--brown-600);max-width:480px;line-height:1.9;margin-bottom:34px}
@media(max-width:960px){.hero-desc{margin-inline:auto}}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap}
@media(max-width:960px){.hero-btns{justify-content:center}}
.hero-stats{display:flex;gap:40px;margin-top:52px;flex-wrap:wrap}
@media(max-width:960px){.hero-stats{justify-content:center}}
.hstat b{display:block;font-family:var(--f-ar-disp);font-size:2rem;color:var(--maroon)}
body.lang-en .hstat b{font-family:var(--f-en-disp)}
.hstat span{font-size:.76rem;color:var(--brown-400);font-weight:600}

.hero-visual{position:relative;display:flex;align-items:center;justify-content:center}
.hv-ring{position:absolute;width:420px;height:420px;border:1.5px dashed rgba(201,162,75,.5);border-radius:50%;animation:spin 60s linear infinite}
.hv-ring2{position:absolute;width:340px;height:340px;border:1px solid rgba(92,33,23,.18);border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}
.hv-frame{position:relative;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--paper),var(--cream2));display:flex;align-items:center;justify-content:center;box-shadow:0 30px 70px rgba(92,33,23,.22),inset 0 0 0 1px rgba(201,162,75,.35),inset 0 0 0 10px var(--paper);z-index:2}
.hv-frame img{width:70%;filter:drop-shadow(0 10px 20px rgba(92,33,23,.2))}
.hv-dot{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(201,162,75,.6)}

/* PAISLEY DIVIDER (signature ornament) */
.divider{position:relative;height:70px;overflow:hidden}
.divider svg{width:100%;height:100%;display:block}

.orn-divider{display:flex;align-items:center;justify-content:center;padding:8px 0}
.orn-divider::before,.orn-divider::after{content:'';flex:1;max-width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.orn-divider svg{width:30px;height:30px;margin:0 16px;flex-shrink:0}

/* FILTER */
.filter-wrap{position:sticky;top:73px;z-index:300;padding:18px 0;background:rgba(251,243,228,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,162,75,.15)}
nav.s ~ .filter-wrap{top:61px}
.filter-inner{max-width:1360px;margin:0 auto;padding:0 40px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ftab{padding:10px 26px;border-radius:50px;background:var(--paper);border:1px solid rgba(140,106,36,.22);color:var(--brown-600);font-weight:700;font-size:.83rem;cursor:none;transition:.3s var(--ease);font-family:inherit}
.ftab:hover{border-color:var(--gold);color:var(--maroon)}
.ftab.on{background:var(--maroon);border-color:var(--maroon);color:var(--gold-light);box-shadow:0 8px 20px rgba(92,33,23,.22)}

/* PRODUCTS */
.prod-sec{padding:90px 0}
.container{max-width:1360px;margin:0 auto;padding:0 40px}
.sec-header{margin-bottom:56px;text-align:center}
.sec-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(201,162,75,.1);border:1px solid rgba(201,162,75,.35);color:var(--gold-dark);padding:6px 18px;border-radius:50px;font-size:.74rem;font-weight:800;margin-bottom:16px}
.sec-title{font-family:var(--f-ar-disp);font-size:clamp(1.9rem,4.4vw,3.1rem);color:var(--maroon);line-height:1.3}
body.lang-en .sec-title{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.sec-lead{color:var(--brown-400);font-size:1rem;line-height:1.8;max-width:520px;margin:14px auto 0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px}

.pc{background:var(--paper);border:1px solid rgba(140,106,36,.16);border-radius:6px;overflow:hidden;cursor:none;transition:.5s var(--ease);position:relative}
.pc::before{content:'';position:absolute;inset:6px;border:1px solid rgba(201,162,75,.35);pointer-events:none;z-index:2;opacity:0;transition:.4s}
.pc:hover::before{opacity:1}
.pc:hover{transform:translateY(-8px);box-shadow:0 30px 60px rgba(92,33,23,.16)}
.pc-img-wrap{height:300px;position:relative;background:radial-gradient(circle at 50% 40%,var(--cream2),var(--cream));display:flex;align-items:center;justify-content:center}
.pc-badge-cat{position:absolute;top:16px;inset-inline-start:16px;background:var(--maroon);color:var(--gold-light);font-size:.66rem;font-weight:800;padding:5px 14px;border-radius:50px;z-index:2}
.pc-medal{width:170px;height:170px;border-radius:50%;background:var(--paper);box-shadow:0 18px 40px rgba(92,33,23,.14),inset 0 0 0 1px rgba(201,162,75,.5),inset 0 0 0 8px var(--cream);display:flex;align-items:center;justify-content:center;transition:.6s var(--ease)}
.pc:hover .pc-medal{transform:scale(1.08) rotate(4deg)}
.pc-medal svg{width:64%;height:64%}
.pc-scent-dot{position:absolute;bottom:18px;inset-inline-end:18px;width:16px;height:16px;border-radius:50%;box-shadow:0 0 0 3px var(--paper),0 4px 10px rgba(0,0,0,.15)}
.pc-body{padding:24px}
.pc-title{font-family:var(--f-ar-disp);font-size:1.15rem;color:var(--brown-900);margin-bottom:8px;line-height:1.4}
body.lang-en .pc-title{font-family:var(--f-en-disp);font-weight:600}
.pc-desc{color:var(--brown-400);font-size:.85rem;line-height:1.75;margin-bottom:16px;min-height:3em}
.pc-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.badge{padding:3px 12px;border-radius:50px;font-size:.66rem;font-weight:800;background:rgba(140,106,36,.08);border:1px solid rgba(140,106,36,.25);color:var(--brown-600)}
.pc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(140,106,36,.14)}
.pc-price{font-weight:800;color:var(--maroon);font-size:1.1rem;font-family:var(--f-ar-disp)}
body.lang-en .pc-price{font-family:var(--f-en-disp)}
.pc-btn{padding:9px 20px;border-radius:50px;background:transparent;border:1px solid var(--maroon);color:var(--maroon);font-weight:800;font-size:.78rem;cursor:none;transition:.3s;font-family:inherit}
.pc-btn:hover{background:var(--maroon);color:var(--gold-light)}

/* WHY */
.why-sec{padding:100px 0;background:var(--brown-900);color:var(--cream);position:relative;overflow:hidden}
.why-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(201,162,75,.1),transparent 55%),radial-gradient(ellipse at 85% 80%,rgba(201,162,75,.06),transparent 55%)}
.why-sec .sec-title,.why-sec .sec-tag{color:var(--gold-light)}
.why-sec .sec-lead{color:rgba(251,243,228,.55)}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:60px;position:relative;z-index:1}
.why-card{background:rgba(251,243,228,.04);border:1px solid rgba(201,162,75,.2);border-radius:6px;padding:34px 26px;transition:.4s var(--ease)}
.why-card:hover{background:rgba(201,162,75,.08);border-color:rgba(201,162,75,.45);transform:translateY(-6px)}
.why-ico{width:42px;height:42px;margin-bottom:20px;display:block;color:var(--gold)}
.why-card h3{font-family:var(--f-ar-disp);font-size:1.1rem;margin-bottom:10px;color:var(--gold-light)}
body.lang-en .why-card h3{font-family:var(--f-en-disp);font-weight:600}
.why-card p{color:rgba(251,243,228,.5);font-size:.85rem;line-height:1.75}

/* ABOUT */
.about-sec{padding:100px 0}
.about-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:70px;align-items:center}
@media(max-width:860px){.about-grid{grid-template-columns:1fr}}
.about-visual{position:relative;display:flex;justify-content:center}
.about-frame{width:100%;max-width:400px;aspect-ratio:1/1.1;border-radius:8px;background:radial-gradient(circle at 50% 35%,var(--cream2),var(--cream));display:flex;align-items:center;justify-content:center;box-shadow:0 30px 70px rgba(92,33,23,.16);position:relative}
.about-frame::before{content:'';position:absolute;inset:14px;border:1px solid rgba(201,162,75,.5)}
.about-frame img{width:56%;filter:drop-shadow(0 14px 24px rgba(92,33,23,.22))}
.about-over{position:absolute;bottom:-20px;inset-inline-start:-20px;background:var(--maroon);color:var(--gold-light);border-radius:6px;padding:18px 24px;text-align:center;box-shadow:0 14px 30px rgba(92,33,23,.3)}
.about-over .n{font-family:var(--f-ar-disp);font-size:2rem}
body.lang-en .about-over .n{font-family:var(--f-en-disp)}
.about-over .l{font-size:.72rem;opacity:.85;font-weight:600}
.about-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(201,162,75,.1);border:1px solid rgba(201,162,75,.35);color:var(--gold-dark);padding:6px 18px;border-radius:50px;font-size:.74rem;font-weight:800;margin-bottom:18px}
.about-title{font-family:var(--f-ar-disp);font-size:clamp(1.7rem,3.6vw,2.7rem);color:var(--maroon);margin-bottom:18px;line-height:1.4}
body.lang-en .about-title{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.about-lead{color:var(--brown-600);font-size:.96rem;line-height:1.9;margin-bottom:26px}
.about-list{list-style:none;margin-bottom:30px}
.about-list li{padding:12px 0;border-bottom:1px solid rgba(140,106,36,.16);font-size:.9rem;color:var(--brown-700);display:flex;align-items:flex-start;gap:12px}
.about-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold-dark);flex-shrink:0;margin-top:7px}
.contact-items{display:flex;flex-direction:column;gap:10px}
.contact-items a{color:var(--brown-600);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:10px;transition:.2s}
.contact-items a:hover{color:var(--maroon)}

/* TESTIMONIALS */
.testi-sec{padding:100px 0;background:var(--cream2)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px;margin-top:56px}
.tc{background:var(--paper);border:1px solid rgba(140,106,36,.18);border-radius:6px;padding:30px;transition:.4s var(--ease)}
.tc:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(92,33,23,.1)}
.tc-stars{color:var(--gold-dark);letter-spacing:2px;margin-bottom:14px}
.tc-text{color:var(--brown-600);font-size:.92rem;line-height:1.85;margin-bottom:22px;font-style:italic}
.tc-auth{display:flex;align-items:center;gap:12px}
.tc-av{width:42px;height:42px;border-radius:50%;background:var(--maroon);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-family:var(--f-ar-disp);font-size:1rem;flex-shrink:0}
.tc-name{font-weight:800;font-size:.88rem;color:var(--brown-900)}
.tc-loc{font-size:.74rem;color:var(--brown-400)}

/* CTA */
.cta-sec{position:relative;padding:130px 32px;text-align:center;overflow:hidden;background:var(--brown-900)}
.cta-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,162,75,.14),transparent 55%)}
.cta-inner{position:relative;z-index:1;max-width:720px;margin:0 auto}
.cta-title{font-family:var(--f-ar-disp);font-size:clamp(2rem,5.6vw,3.6rem);color:var(--gold-light);margin-bottom:20px;line-height:1.35}
body.lang-en .cta-title{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.cta-lead{color:rgba(251,243,228,.55);font-size:1rem;line-height:1.85;margin-bottom:40px}
.cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-wa{background:#25D366;color:#fff;font-weight:800;box-shadow:0 8px 22px rgba(37,211,102,.3)}
.btn-wa:hover{box-shadow:0 12px 32px rgba(37,211,102,.5);transform:translateY(-2px)}

/* FOOTER */
footer{background:var(--brown-900);padding:64px 0 26px;border-top:1px solid rgba(201,162,75,.15)}
.fg{max-width:1360px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:40px;margin-bottom:46px}
footer h4{font-size:.86rem;font-weight:800;color:var(--gold-light);margin-bottom:18px;letter-spacing:.03em}
.fl{list-style:none}
.fl li{margin-bottom:10px}
.fl a{text-decoration:none;color:rgba(251,243,228,.42);font-size:.83rem;transition:.2s}
.fl a:hover{color:var(--gold)}
.f-brand{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.f-brand img{width:34px;height:34px;object-fit:contain}

/* ================= HERO GOLD DUST (henna dot motif) ================= */
(function(){
  const c=document.getElementById('dust-canvas');const ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  const dots=[];
  for(let i=0;i<44;i++)dots.push({x:Math.random()*1400,y:Math.random()*700,r:Math.random()*2.2+.6,vx:(Math.random()-.5)*.15,vy:-(Math.random()*.25+.06),op:Math.random()*.5+.15,t:Math.random()*Math.PI*2,pulse:Math.random()*.01+.004});
  function draw(){
    ctx.clearRect(0,0,W,H);
    dots.forEach(d=>{
      d.t+=d.pulse;const op=d.op*(0.6+0.4*Math.sin(d.t));
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,162,75,${op})`;ctx.fill();
      d.x+=d.vx;d.y+=d.vy;
      if(d.y<-10){d.y=H+10;d.x=Math.random()*W;}
      if(d.x<-10||d.x>W+10){d.x=Math.random()*W;}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

  const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;
  prog.style.width=(s/h*100)+'%';
  navEl.classList.toggle('s',s>60);
  wafab.classList.toggle('show',s>400);
  cartFab.classList.toggle('cart-fab--visible',s>400);
});

/* ================= REVEAL ================= */
const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis');}),{threshold:.07,rootMargin:'0px 0px -20px 0px'});
document.querySelectorAll('.rv').forEach(r=>obs.observe(r));

/* ================= MOBILE MENU ================= */
document.getElementById('ham').addEventListener('click',()=>document.getElementById('mob').classList.toggle('open'));
function closeMob(){document.getElementById('mob').classList.remove('open');}
window.closeMob=closeMob;

/* ================= FILTER ================= */
let currentFilter='all';
function applyFilter(f){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  document.querySelectorAll('.pc').forEach(c=>{
    if(f==='all'||c.dataset.c===f){c.style.opacity='1';c.style.transform='';c.style.pointerEvents='';c.style.display='';}
    else{c.style.opacity='0';c.style.pointerEvents='none';c.style.display='none';}
  });
}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.ftab');
  if(btn) applyFilter(btn.dataset.f);
});

/* ================= QUICK ORDER DRAWER ================= */
function calcTot(){
  const ps=document.getElementById('ps');
  const parts=ps.value.split('|');if(!parts[1])return;
  document.getElementById('ta').textContent=(parseInt(parts[1])*(parseInt(document.getElementById('qty').value)||1))+' '+(LANG==='ar'?'دج':'DZD');
}
document.getElementById('ps').addEventListener('change',calcTot);
document.getElementById('qty').addEventListener('input',calcTot);

function openD(){document.getElementById('dr').classList.add('open');document.getElementById('ov').style.display='block';document.body.style.overflow='hidden';}
function closeD(){document.getElementById('dr').classList.remove('open');document.getElementById('ov').style.display='none';document.body.style.overflow='';}
window.openD=openD;window.closeD=closeD;

function sendOrd(){
  const ps=document.getElementById('ps');
  const parts=ps.value.split('|');
  if(!parts[1]){alert(LANG==='ar'?'يرجى اختيار منتج':'Please select a product');return;}
  const n=document.getElementById('cn').value.trim(),ph=document.getElementById('cp').value.trim();
  if(!n||!ph){alert(LANG==='ar'?'يرجى إدخال الاسم ورقم الهاتف':'Please enter your name and phone number');return;}
  const qty=document.getElementById('qty').value,addr=document.getElementById('ca').value.trim();
  const tot=parseInt(parts[1])*parseInt(qty);
  const prodName=ps.options[ps.selectedIndex].textContent.split(' — ')[0];
  const msg=LANG==='ar'
    ? `🌿 طلب جديد — لمسة LAMSA%0A📦 ${prodName}%0A🔢 الكمية: ${qty}%0A💰 الإجمالي: ${tot} دج%0A👤 ${n}%0A📞 ${ph}%0A📍 ${addr||'غير محدد'}%0A✨ شكراً!`
    : `🌿 New order — LAMSA%0A📦 ${prodName}%0A🔢 Qty: ${qty}%0A💰 Total: ${tot} DZD%0A👤 ${n}%0A📞 ${ph}%0A📍 ${addr||'N/A'}%0A✨ Thank you!`;
  window.open(`https://wa.me/213656198526?text=${msg}`,'_blank');closeD();
}
window.sendOrd=sendOrd;

/* ================================================================
   CART SYSTEM
   ================================================================ */
const cartFabEl=document.getElementById('cartFab');
const cartBadge=document.getElementById('cartBadge');
const cartOverlay=document.getElementById('cartOverlay');
const cartModal=document.getElementById('cartModal');
const cartBody=document.getElementById('cartBody');
const cartTotal=document.getElementById('cartTotal');
const cartCheckout=document.getElementById('cartCheckout');
const cartToasts=document.getElementById('cartToasts');
const cartClose=document.getElementById('cartClose');

const cartState={
  items:[], // [{id, quantity}]
  isOpen:false,
  get totalQty(){return this.items.reduce((s,i)=>s+i.quantity,0);},
  get totalPrice(){return this.items.reduce((s,i)=>{const p=PRODUCTS.find(pp=>pp.id===i.id);return s+(p?p.price*i.quantity:0);},0);}
};

function updateCartBadge(){
  cartBadge.textContent=cartState.totalQty;
  cartBadge.classList.remove('cart-fab__badge--bump');
  void cartBadge.offsetWidth;
  cartBadge.classList.add('cart-fab__badge--bump');
}

function openCart(){
  cartState.isOpen=true;
  renderCartItems();
  cartModal.classList.add('cart-modal--open');
  cartOverlay.classList.add('cart-overlay--visible');
  document.body.style.overflow='hidden';
  cartClose.focus();
}
window.openCart=openCart;

function closeCart(){
  cartState.isOpen=false;
  cartModal.classList.remove('cart-modal--open');
  cartOverlay.classList.remove('cart-overlay--visible');
  document.body.style.overflow='';
}

function renderCartItems(){
  cartTotal.textContent=`${cartState.totalPrice.toLocaleString('en-US')} ${LANG==='ar'?'دج':'DZD'}`;
  cartCheckout.disabled=cartState.items.length===0;

  if(cartState.items.length===0){
    cartBody.innerHTML=`
      <div class="cart-modal__empty">
        <span class="cart-modal__empty-icon">🛒</span>
        <p class="cart-modal__empty-text">${T.cart_empty_text[LANG]}</p>
        <p class="cart-modal__empty-sub">${T.cart_empty_sub[LANG]}</p>
      </div>`;
    return;
  }

  cartBody.innerHTML=cartState.items.map(({id,quantity})=>{
    const p=PRODUCTS.find(pp=>pp.id===id);
    if(!p) return '';
    const subtotal=(p.price*quantity).toLocaleString('en-US');
    return `
      <div class="cart-modal__item" data-id="${id}">
        <div class="cart-modal__item-name">${p.name[LANG]}</div>
        <div class="cart-modal__item-controls">
          <button class="cart-modal__btn cart-modal__btn--remove" onclick="removeFromCart('${id}')" title="remove">🗑</button>
          <button class="cart-modal__btn" onclick="decrementItem('${id}')">−</button>
          <span class="cart-modal__item-qty">${quantity}</span>
          <button class="cart-modal__btn" onclick="incrementItem('${id}')">+</button>
        </div>
        <span class="cart-modal__item-subtotal">${subtotal} ${LANG==='ar'?'دج':'DZD'}</span>
      </div>`;
  }).join('');
}

function showToast(message){
  const toast=document.createElement('div');
  toast.className='cart-toast';
  toast.textContent=message;
  cartToasts.appendChild(toast);
  setTimeout(()=>{
    toast.classList.add('cart-toast--out');
    toast.addEventListener('animationend',()=>toast.remove(),{once:true});
  },2000);
}

function addToCart(id){
  const p=PRODUCTS.find(pp=>pp.id===id);
  if(!p) return;
  const existing=cartState.items.find(i=>i.id===id);
  if(existing){
    existing.quantity+=1;
    showToast((LANG==='ar'?'✅ تمت زيادة كمية ':'✅ Increased quantity of ')+`"${p.name[LANG]}"`);
  }else{
    cartState.items.push({id,quantity:1});
    showToast((LANG==='ar'?'🛒 أُضيف ':'🛒 Added ')+`"${p.name[LANG]}"`+(LANG==='ar'?' للسلة':' to cart'));
  }
  updateCartBadge();
  if(cartState.isOpen) renderCartItems();
}
window.addToCart=addToCart;

function removeFromCart(id){
  const p=PRODUCTS.find(pp=>pp.id===id);
  cartState.items=cartState.items.filter(i=>i.id!==id);
  showToast((LANG==='ar'?'🗑 تمت إزالة ':'🗑 Removed ')+`"${p?p.name[LANG]:''}"`);
  updateCartBadge();
  renderCartItems();
}
window.removeFromCart=removeFromCart;

function incrementItem(id){
  const item=cartState.items.find(i=>i.id===id);
  if(item){item.quantity+=1;updateCartBadge();renderCartItems();}
}
window.incrementItem=incrementItem;

function decrementItem(id){
  const item=cartState.items.find(i=>i.id===id);
  if(!item) return;
  if(item.quantity<=1){removeFromCart(id);}
  else{item.quantity-=1;updateCartBadge();renderCartItems();}
}
window.decrementItem=decrementItem;

function checkoutViaWhatsApp(){
  if(cartState.items.length===0){
    showToast(LANG==='ar'?'⚠️ سلتك فارغة! أضيفي منتجاً أولاً':'⚠️ Your cart is empty! Add a product first');
    return;
  }
  const name=document.getElementById('cust-name').value.trim();
  const phone=document.getElementById('cust-phone').value.trim();
  const loc=document.getElementById('cust-loc').value.trim();
  const hood=document.getElementById('cust-hood').value.trim();
  if(!name||!phone||!loc||!hood){
    showToast(LANG==='ar'?'⚠️ يرجى ملء بيانات الزبونة أولاً!':'⚠️ Please fill in your details first!');
    return;
  }
  const itemLines=cartState.items.map(({id,quantity})=>{
    const p=PRODUCTS.find(pp=>pp.id===id);
    const subtotal=(p.price*quantity).toLocaleString('en-US');
    return LANG==='ar'
      ? `• ${p.name[LANG]} (الكمية: ${quantity}) = ${subtotal} دج`
      : `• ${p.name[LANG]} (Qty: ${quantity}) = ${subtotal} DZD`;
  }).join('\n');

  const message=(LANG==='ar'?[
    '*🌿 طلب جديد من لمسة LAMSA:*','',
    '*👤 بيانات الزبونة:*',
    `الاسم: ${name}`,`الهاتف: ${phone}`,`الولاية: ${loc}`,`الحي/العنوان: ${hood}`,'',
    '*📦 المنتجات:*',itemLines,'',
    `*💰 المجموع الإجمالي: ${cartState.totalPrice.toLocaleString('en-US')} دج*`
  ]:[
    '*🌿 New order from LAMSA:*','',
    '*👤 Customer details:*',
    `Name: ${name}`,`Phone: ${phone}`,`Wilaya: ${loc}`,`Address: ${hood}`,'',
    '*📦 Products:*',itemLines,'',
    `*💰 Total: ${cartState.totalPrice.toLocaleString('en-US')} DZD*`
  ]).join('\n');

  const whatsappUrl=`https://wa.me/213656198526?text=${encodeURIComponent(message)}`;
  window.open(whatsappUrl,'_blank');
}

cartFabEl.addEventListener('click',openCart);
cartClose.addEventListener('click',closeCart);
cartOverlay.addEventListener('click',closeCart);
document.addEventListener('keydown',({key})=>{ if(key==='Escape'&&cartState.isOpen) closeCart(); });
cartCheckout.addEventListener('click',checkoutViaWhatsApp);

/* ================= INIT ================= */
applyLang();
attachCursorHover();
updateCartBadge();
</script>
</body>
</html>
