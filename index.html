<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMSA لمسة للستكرات — المتجر الكامل (معاينة)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Marcellus&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FBF3E4;--cream2:#F3E2C4;--paper:#FFFBF3;
  --brown-900:#2A160D;--brown-800:#3C2113;--brown-700:#4E2C18;--brown-600:#6B3F22;--brown-400:#9C7248;
  --maroon:#5C2117;--gold:#C9A24B;--gold-light:#E8CE8E;--gold-dark:#8C6A24;
  --terracotta:#8C4A2F;--rose:#A85C6B;--skin:#E4C49A;
  --green-ok:#2E7D4F;--red-out:#B33226;
  --ink:#2A160D;--ease:cubic-bezier(.23,1,.32,1);
  --f-ar-disp:'Aref Ruqaa',serif;--f-ar-body:'Amiri',serif;
  --f-en-disp:'Cormorant Garamond',serif;--f-en-eyebrow:'Marcellus',serif;
}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--f-ar-body)}
body.lang-en{font-family:var(--f-en-disp)}
.disp{font-family:var(--f-ar-disp)}
body.lang-en .disp{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.eyebrow{font-family:var(--f-ar-body);font-weight:700}
body.lang-en .eyebrow{font-family:var(--f-en-eyebrow);font-weight:400;letter-spacing:.14em;text-transform:uppercase}
button,input,select{font-family:inherit}

/* TOPBAR */
.topbar{background:var(--brown-900);color:var(--gold-light);padding:9px 16px;text-align:center;font-size:.76rem;font-weight:700}

/* NAV */
nav{padding:14px 0;background:rgba(251,243,228,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,162,75,.18);position:sticky;top:0;z-index:600}
.nc{max-width:1320px;margin:0 auto;padding:0 30px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-family:var(--f-ar-disp);font-size:1.3rem;color:var(--maroon)}
body.lang-en .logo{font-family:var(--f-en-eyebrow);letter-spacing:.18em;font-size:1.05rem}
.logo b{color:var(--gold-dark)}
.nb{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.langtog{display:flex;border:1px solid rgba(140,106,36,.35);border-radius:50px;overflow:hidden;font-size:.7rem;font-weight:800}
.langtog button{padding:6px 13px;background:transparent;border:none;color:var(--brown-600);cursor:pointer;font-family:'Marcellus',serif}
.langtog button.on{background:var(--maroon);color:var(--gold-light)}
.btn-cart{position:relative;padding:10px 20px;border-radius:50px;background:var(--maroon);color:var(--gold-light);font-weight:800;font-size:.82rem;border:none;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-cart .n{background:var(--gold);color:var(--brown-900);border-radius:50%;min-width:19px;height:19px;font-size:.68rem;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* WING SWITCH */
.wing-bar{background:linear-gradient(135deg,var(--brown-900),var(--brown-800));padding:22px 0}
.wing-inner{max-width:1320px;margin:0 auto;padding:0 30px;text-align:center}
.wing-label{font-size:.75rem;color:var(--gold-light);opacity:.7;margin-bottom:12px;font-weight:700}
.wing-switch{display:inline-flex;background:rgba(251,243,228,.06);border:1px solid rgba(201,162,75,.35);border-radius:50px;padding:5px}
.wing-btn{padding:11px 30px;border-radius:50px;border:none;background:transparent;color:rgba(251,243,228,.55);font-weight:800;font-size:.9rem;cursor:pointer;transition:.3s var(--ease);display:flex;align-items:center;gap:8px}
.wing-btn.on{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--brown-900);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.wing-note{margin-top:14px;font-size:.78rem;color:rgba(251,243,228,.5)}
.wing-note b{color:var(--gold-light)}

/* CATEGORY FILTER */
.filter-wrap{position:sticky;top:65px;z-index:400;padding:16px 0;background:rgba(251,243,228,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,162,75,.15)}
.filter-inner{max-width:1320px;margin:0 auto;padding:0 30px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ftab{padding:9px 22px;border-radius:50px;background:var(--paper);border:1px solid rgba(140,106,36,.22);color:var(--brown-600);font-weight:700;font-size:.8rem;cursor:pointer;transition:.3s var(--ease)}
.ftab:hover{border-color:var(--gold)}
.ftab.on{background:var(--maroon);border-color:var(--maroon);color:var(--gold-light)}

/* GRID */
.container{max-width:1320px;margin:0 auto;padding:0 30px}
.prod-sec{padding:50px 0 90px}
.sec-header{text-align:center;margin-bottom:40px}
.sec-title{font-family:var(--f-ar-disp);font-size:clamp(1.7rem,4vw,2.5rem);color:var(--maroon)}
body.lang-en .sec-title{font-family:var(--f-en-disp);font-weight:600;font-style:italic}
.sec-lead{color:var(--brown-400);font-size:.92rem;margin-top:8px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:24px}

.pc{background:var(--paper);border:1px solid rgba(140,106,36,.16);border-radius:14px;overflow:hidden;transition:.4s var(--ease);position:relative}
.pc:hover{transform:translateY(-6px);box-shadow:0 24px 50px rgba(92,33,23,.14)}
.pc.out{opacity:.72}
.pc-media{position:relative;aspect-ratio:1/1;background:var(--cream2)}
.pc-cat-badge{position:absolute;top:12px;inset-inline-start:12px;font-size:.63rem;font-weight:800;padding:4px 12px;border-radius:50px;color:#fff;z-index:3}
.pc-stock-badge{position:absolute;top:12px;inset-inline-end:12px;font-size:.62rem;font-weight:800;padding:4px 11px;border-radius:50px;z-index:3;background:rgba(179,50,38,.92);color:#fff}
.pc-view-tabs{position:absolute;bottom:10px;inset-inline-start:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3}
[dir="rtl"] .pc-view-tabs{transform:translateX(50%)}
.pc-view-tabs button{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:rgba(42,22,13,.5);color:#fff;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s}
.pc-view-tabs button.on{background:var(--gold);border-color:var(--gold);color:var(--brown-900)}
.pc-art{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .4s var(--ease)}
.pc-art.on{opacity:1}
.pc-body{padding:18px}
.pc-title{font-family:var(--f-ar-disp);font-size:1.02rem;color:var(--brown-900);margin-bottom:6px}
body.lang-en .pc-title{font-family:var(--f-en-disp);font-weight:600}
.pc-mat{font-size:.72rem;color:var(--brown-400);margin-bottom:12px}
.pc-price-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.pc-price{font-family:var(--f-ar-disp);font-size:1.2rem;color:var(--maroon)}
body.lang-en .pc-price{font-family:var(--f-en-disp)}
.pc-price-tag{font-size:.65rem;font-weight:800;color:var(--gold-dark);background:rgba(201,162,75,.12);padding:3px 9px;border-radius:50px}
.pc-btn{width:100%;padding:10px;border-radius:50px;background:transparent;border:1.5px solid var(--maroon);color:var(--maroon);font-weight:800;font-size:.8rem;cursor:pointer;transition:.3s}
.pc-btn:hover{background:var(--maroon);color:var(--gold-light)}
.pc-btn:disabled{border-color:rgba(140,106,36,.25);color:var(--brown-400);cursor:not-allowed}
.pc-btn:disabled:hover{background:transparent;color:var(--brown-400)}

/* CART MODAL */
.ov2{position:fixed;inset:0;background:rgba(42,22,13,.62);backdrop-filter:blur(6px);z-index:850;opacity:0;pointer-events:none;transition:opacity .35s var(--ease)}
.ov2.show{opacity:1;pointer-events:all}
.cart-modal{position:fixed;top:0;bottom:0;inset-inline-end:-100%;width:460px;max-width:94vw;background:var(--paper);z-index:900;transition:inset-inline-end .45s var(--ease);display:flex;flex-direction:column;border-inline-start:1px solid rgba(201,162,75,.25)}
.cart-modal.open{inset-inline-end:0}
.cm-head{padding:20px 22px;border-bottom:1px solid rgba(140,106,36,.15);display:flex;align-items:center;justify-content:space-between}
.cm-head h3{font-family:var(--f-ar-disp);font-size:1.15rem;color:var(--maroon)}
.cm-close{width:32px;height:32px;border-radius:50%;border:1px solid rgba(140,106,36,.25);background:var(--cream);cursor:pointer;color:var(--brown-600)}
.cm-wing{padding:12px 22px;background:var(--cream2);font-size:.76rem;font-weight:800;color:var(--brown-700);text-align:center}
.cm-body{flex:1;overflow-y:auto;padding:16px 22px}
.cm-empty{text-align:center;padding:50px 10px;color:var(--brown-400)}
.cm-empty span{font-size:2.6rem;display:block;margin-bottom:10px;opacity:.4}
.cm-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(140,106,36,.1)}
.cm-item-name{flex:1;font-size:.84rem;font-weight:700;color:var(--brown-800)}
.cm-item-price{font-size:.8rem;font-weight:800;color:var(--maroon);white-space:nowrap}
.cm-qty{display:flex;align-items:center;gap:6px}
.cm-qty button{width:24px;height:24px;border-radius:50%;border:1px solid rgba(140,106,36,.3);background:var(--cream);cursor:pointer;font-size:.8rem}
.cm-remove{color:var(--red-out);background:none;border:none;cursor:pointer;font-size:.85rem}

.wholesale-gate{margin:14px 0;padding:14px 16px;border-radius:10px;background:rgba(180,50,40,.08);border:1px solid rgba(180,50,40,.28)}
.wholesale-gate.ok{background:rgba(46,125,79,.08);border-color:rgba(46,125,79,.28)}
.wg-text{font-size:.78rem;color:var(--brown-700);margin-bottom:8px;line-height:1.7}
.wg-bar{height:6px;border-radius:6px;background:rgba(140,106,36,.15);overflow:hidden}
.wg-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width .4s var(--ease)}

.cm-foot{padding:18px 22px 22px;border-top:1px solid rgba(140,106,36,.15)}
.cm-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:12px 16px;background:rgba(201,162,75,.09);border:1px solid rgba(201,162,75,.3);border-radius:8px}
.cm-total b{font-family:var(--f-ar-disp);font-size:1.25rem;color:var(--maroon)}
.cm-fields{display:none;flex-direction:column;gap:10px;margin-bottom:14px}
.cm-fields.show{display:flex}
.fc{width:100%;padding:11px 14px;border-radius:6px;border:1px solid rgba(140,106,36,.3);background:var(--cream);font-size:.85rem;color:var(--ink);outline:none}
.fc:focus{border-color:var(--gold-dark)}
.btn-checkout{width:100%;padding:13px;border-radius:50px;background:#25D366;color:#fff;font-weight:800;font-size:.88rem;border:none;cursor:pointer}
.btn-checkout:disabled{opacity:.4;cursor:not-allowed}
.btn-toggle-fields{width:100%;padding:12px;border-radius:50px;background:var(--maroon);color:var(--gold-light);font-weight:800;font-size:.86rem;border:none;cursor:pointer;margin-bottom:10px}
.btn-toggle-fields:disabled{opacity:.4;cursor:not-allowed;background:var(--brown-400)}

/* MESSENGER FAB */
.msg-fab{position:fixed;bottom:28px;inset-inline-start:28px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00B2FF,#006AFF);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,106,255,.35);z-index:500;text-decoration:none;font-size:1.5rem;color:#fff}

/* TOAST */
.toast-wrap{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--brown-900);color:var(--gold-light);padding:11px 22px;border-radius:50px;font-size:.82rem;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:tin .3s ease;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* DEV NOTE */
.dev-wrap{max-width:1320px;margin:0 auto;padding:0 30px 60px}
.dev-note{background:rgba(201,162,75,.09);border:1px dashed rgba(201,162,75,.5);border-radius:10px;padding:16px 20px;font-size:.8rem;color:var(--brown-700);line-height:1.85}
.dev-note b{color:var(--maroon)}

footer{background:var(--brown-900);padding:40px 0;text-align:center}
footer p{color:rgba(251,243,228,.4);font-size:.8rem}
footer a{color:var(--gold-light);text-decoration:none}

@media(max-width:600px){
  .container,.nc,.filter-inner,.wing-inner{padding-inline:18px}
  .pgrid{grid-template-columns:1fr 1fr;gap:14px}
  .cart-modal{width:100vw}
}
@media(max-width:420px){.pgrid{grid-template-columns:1fr}}
</style>
</head>

<script>
/* ================= i18n ================= */
const T={
  topbar:{ar:"🌿 معاينة تصميم كاملة للمتجر — LAMSA للستكرات",en:"🌿 Full Store Design Preview — LAMSA Stickers"},

  prod_lead:{ar:"اضغطي 🏷️ لرؤية الملصق أو 🤲 لرؤية شكله بعد التطبيق على اليد",en:"Tap 🏷️ for the sticker view or 🤲 to see it applied on the hand"},

  cm_wing_retail:{ar:"🛍️ سلة جناح التجزئة",en:"🛍️ Retail Wing Cart"},
  cm_wing_wholesale:{ar:"🏷️ سلة جناح الجملة",en:"🏷️ Wholesale Wing Cart"},
  cm_empty_t:{ar:"سلتك فارغة",en:"Your cart is empty"},
  cm_empty_s:{ar:"أضيفي رشمة من المجموعة",en:"Add a design from the collection"},
  btn_continue:{ar:"متابعة الطلب",en:"Continue to Checkout"},
  btn_checkout:{ar:"إرسال الطلب عبر واتساب",en:"Send Order via WhatsApp"},
  gate_need:{ar:"سلتك الحالية: <b>{cur} دج</b> — يلزم الوصول لـ <b>180 دج</b> لإتمام طلب الجملة. أضيفي <b>{rest} دج</b> أخرى، أو",en:"Your cart: <b>{cur} DZD</b> — wholesale orders require <b>180 DZD</b>. Add <b>{rest} DZD</b> more, or"},

  ph_name:{ar:"الاسم الكامل",en:"Full name"},
  dev_title:{ar:"ملاحظة للمصمم",en:"Designer's Note"},
  dev_text:{ar:"هذه معاينة أمامية كاملة للهوية والتدفق (السلة، الحد الأدنى للجملة، منع خلط الجناحين، صورتا المنتج). عند البناء الفعلي على WooCommerce/YouCan سيتحول: زر واتساب إلى نظام COD وإشعارات فورية حقيقية، وزر ماسنجر إلى تكامل حقيقي بصفحتكم، والمخزون إلى تتبع تلقائي متزامن لكل الزوار.",en:"This is a complete front-end preview of the identity and flow (cart, wholesale minimum, wing-mixing prevention, dual product images). On the real WooCommerce/YouCan build: the WhatsApp button becomes real COD + instant notifications, the Messenger button connects to your real Page, and stock becomes auto-synced for every visitor."},

  {id:'w2',cat:'water',petals:8,seed:24,retail:320,wholesale:220,stock:true,name:{ar:'رذاذ الذهب',en:'Gold Mist'}},
  {id:'w3',cat:'water',petals:10,seed:33,retail:290,wholesale:200,stock:true,name:{ar:'تدرج الفجر',en:'Dawn Gradient'}},
  {id:'w4',cat:'water',petals:8,seed:14,retail:310,wholesale:215,stock:true,name:{ar:'ألوان الياسمين',en:'Jasmine Hues'}},

/* ================= mandala art generator ================= */
function mandalaMarkup(cx,cy,scale,petals,seed,accent,accent2){
  scale=scale||1;
  const petal=`M${cx},${cy-70*scale} C${cx+22*scale},${cy-52*scale} ${cx+24*scale},${cy-28*scale} ${cx+10*scale},${cy-16*scale} C${cx+2*scale},${cy-10*scale} ${cx-8*scale},${cy-14*scale} ${cx-6*scale},${cy-24*scale} C${cx-4*scale},${cy-34*scale} ${cx+4*scale},${cy-36*scale} ${cx},${cy-28*scale}`;
  let out='';
  const step=360/petals;
  for(let i=0;i<petals;i++){
    out+=`<path d="${petal}" fill="none" stroke="${accent}" stroke-width="1.6" transform="rotate(${seed+i*step} ${cx} ${cy})"/>`;
  }
  return `
    <circle cx="${cx}" cy="${cy}" r="${88*scale}" fill="none" stroke="${accent2}" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="${68*scale}" fill="none" stroke="${accent2}" stroke-width="1"/>
    ${out}
    <circle cx="${cx}" cy="${cy}" r="${16*scale}" fill="none" stroke="${accent}" stroke-width="1.6"/>
    <circle cx="${cx}" cy="${cy}" r="${5*scale}" fill="${accent}"/>
  `;
}
function bgForCat(cat,uid){
  if(cat==='fabric'){
    return `<defs><pattern id="wv-${uid}" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M0,10 L10,0" stroke="#E8CE8E" stroke-width="0.6" opacity=".5"/></pattern></defs>
    <rect width="260" height="260" fill="url(#wv-${uid})"/>`;
  }
  if(cat==='water'){
    return `<defs><radialGradient id="wa-${uid}" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#F3E2C4"/><stop offset="100%" stop-color="#FBF3E4"/></radialGradient></defs>
    <rect width="260" height="260" fill="url(#wa-${uid})"/>`;
  }
  return `<defs><pattern id="gr-${uid}" width="14" height="14" patternUnits="userSpaceOnUse"><path d="M14,0 L0,0 0,14" fill="none" stroke="#E8CE8E" stroke-width="0.4" opacity=".5"/></pattern></defs>
  <rect width="260" height="260" fill="url(#gr-${uid})"/>`;
}
function stickerSVG(p,uid){
  const a=CAT_ACCENT[p.cat],a2=CAT_ACCENT2[p.cat];
  return `${bgForCat(p.cat,uid)}
    <rect x="6" y="6" width="248" height="248" rx="16" fill="none" stroke="${a}" stroke-width="1" stroke-dasharray="4 4" opacity=".5"/>
    ${mandalaMarkup(130,130,1,p.petals,p.seed,a,a2)}`;
}
function appliedSVG(p,uid){
  const a=CAT_ACCENT[p.cat],a2=CAT_ACCENT2[p.cat];
  return `
    <rect width="260" height="340" fill="#FBF3E4"/>
    <ellipse cx="130" cy="322" rx="90" ry="10" fill="#3C2113" opacity=".07"/>
    <rect x="70" y="170" width="120" height="150" rx="55" fill="#E4C49A"/>
    <rect x="42" y="150" width="30" height="88" rx="15" fill="#E4C49A" transform="rotate(-40 57 194)"/>
    <rect x="88" y="78" width="24" height="112" rx="12" fill="#E4C49A" transform="rotate(-7 100 134)"/>
    <rect x="118" y="58" width="26" height="132" rx="13" fill="#E4C49A"/>
    <rect x="150" y="72" width="24" height="118" rx="12" fill="#E4C49A" transform="rotate(7 162 131)"/>
    <rect x="178" y="98" width="20" height="92" rx="10" fill="#E4C49A" transform="rotate(16 188 144)"/>
    <rect x="70" y="170" width="120" height="150" rx="55" fill="none" stroke="#D2AD7C" stroke-width="1" opacity=".6"/>
    ${mandalaMarkup(132,258,0.6,p.petals,p.seed,a,a2)}`;
}

/* ================= render products ================= */
let currentFilter='all';
function renderProducts(){
  const grid=document.getElementById('pgrid');
  grid.innerHTML=PRODUCTS.map(p=>{
    const price=WING==='retail'?p.retail:p.wholesale;
    const tag=WING==='retail'?T.tag_retail[LANG]:T.tag_wholesale[LANG];
    const matKey='mat_'+p.cat, catKey='cat_'+p.cat;
    return `<div class="pc${p.stock?'':' out'}" data-cat="${p.cat}">
      <div class="pc-media">
        <span class="pc-cat-badge" style="background:${CAT_ACCENT[p.cat]}">${T[catKey][LANG]}</span>
        ${p.stock?'':`<span class="pc-stock-badge" data-i18n="stock_out"></span>`}
        <svg class="pc-art on" viewBox="0 0 260 260" data-v="sticker">${stickerSVG(p,p.id+'a')}</svg>
        <svg class="pc-art" viewBox="0 0 260 340" data-v="applied">${appliedSVG(p,p.id+'b')}</svg>
        <div class="pc-view-tabs">
          <button class="on" onclick="setCardView(this,'${p.id}','sticker')">🏷️</button>
          <button onclick="setCardView(this,'${p.id}','applied')">🤲</button>
        </div>
      </div>
      <div class="pc-body">
        <div class="pc-title">${p.name[LANG]}</div>
        <div class="pc-mat">${T[matKey][LANG]}</div>
        <div class="pc-price-row">
          <span class="pc-price">${price} ${LANG==='ar'?'دج':'DZD'}</span>
          <span class="pc-price-tag">${tag}</span>
        </div>
        <button class="pc-btn" ${p.stock?'':'disabled'} onclick="addToCart('${p.id}')">${p.stock?T.btn_add[LANG]:T.btn_unavailable[LANG]}</button>
      </div>
    </div>`;
  }).join('');
  applyFilter(currentFilter);
}
function setCardView(btn,id,view){
  const card=btn.closest('.pc');
  card.querySelectorAll('.pc-view-tabs button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  card.querySelectorAll('.pc-art').forEach(a=>a.classList.toggle('on',a.dataset.v===view));
}
window.setCardView=setCardView;

function applyFilter(f){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('on',b.dataset.c===f));
  document.querySelectorAll('.pc').forEach(c=>{
    c.style.display=(f==='all'||c.dataset.cat===f)?'':'none';
  });
}
document.addEventListener('click',e=>{
  const b=e.target.closest('.ftab');
  if(b) applyFilter(b.dataset.c);
});

/* ================= wing ================= */
function setWing(w){
  WING=w;
  document.getElementById('wing-retail').classList.toggle('on',w==='retail');
  document.getElementById('wing-wholesale').classList.toggle('on',w==='wholesale');
  document.getElementById('wingNote').innerHTML=(w==='retail'?T.wing_note_retail:T.wing_note_wholesale)[LANG];
  renderProducts();
}
window.setWing=setWing;

/* ================= cart ================= */
const cart={items:[],wing:null}; // items: [{id, qty}]
function cartTotal(){
  return cart.items.reduce((s,i)=>{
    const p=PRODUCTS.find(pp=>pp.id===i.id);
    const price=cart.wing==='retail'?p.retail:p.wholesale;
    return s+price*i.qty;
  },0);
}
function cartCount(){return cart.items.reduce((s,i)=>s+i.qty,0);}

function addToCart(id){
  if(cart.items.length>0 && cart.wing!==WING){
    showToast(T.toast_mixwing[LANG]);
    return;
  }
  cart.wing=WING;
  const ex=cart.items.find(i=>i.id===id);
  if(ex) ex.qty+=1; else cart.items.push({id,qty:1});
  document.getElementById('cartCount').textContent=cartCount();
  showToast(T.toast_added[LANG]);
  renderCart();
}
window.addToCart=addToCart;

function changeQty(id,d){
  const it=cart.items.find(i=>i.id===id);
  if(!it) return;
  it.qty+=d;
  if(it.qty<=0){
    cart.items=cart.items.filter(i=>i.id!==id);
    if(cart.items.length===0) cart.wing=null;
  }
  document.getElementById('cartCount').textContent=cartCount();
  renderCart();
}
window.changeQty=changeQty;

function removeItem(id){
  cart.items=cart.items.filter(i=>i.id!==id);
  if(cart.items.length===0) cart.wing=null;
  document.getElementById('cartCount').textContent=cartCount();
  showToast(T.toast_removed[LANG]);
  renderCart();
}
window.removeItem=removeItem;

function renderCart(){
  const body=document.getElementById('cmBody');
  const wingLabel=document.getElementById('cmWing');
  const gateWrap=document.getElementById('wholesaleGate');
  const total=cartTotal();
  document.getElementById('cmTotal').textContent=total.toLocaleString('en-US')+' '+(LANG==='ar'?'دج':'DZD');

  if(!cart.wing){
    wingLabel.textContent='';
  }else{
    wingLabel.textContent=(cart.wing==='retail'?T.cm_wing_retail:T.cm_wing_wholesale)[LANG];
  }

  if(cart.items.length===0){
    body.innerHTML=`<div class="cm-empty"><span>🛒</span><div style="font-weight:800;color:var(--brown-700)">${T.cm_empty_t[LANG]}</div><div style="font-size:.82rem;margin-top:6px">${T.cm_empty_s[LANG]}</div></div>`;
  }else{
    body.innerHTML=cart.items.map(i=>{
      const p=PRODUCTS.find(pp=>pp.id===i.id);
      const price=cart.wing==='retail'?p.retail:p.wholesale;
      return `<div class="cm-item">
        <div class="cm-item-name">${p.name[LANG]}<br><button class="cm-remove" onclick="removeItem('${p.id}')">${LANG==='ar'?'إزالة':'Remove'}</button></div>
        <div class="cm-qty">
          <button onclick="changeQty('${p.id}',-1)">−</button><span>${i.qty}</span><button onclick="changeQty('${p.id}',1)">+</button>
        </div>
        <div class="cm-item-price">${(price*i.qty).toLocaleString('en-US')} ${LANG==='ar'?'دج':'DZD'}</div>
      </div>`;
    }).join('');
  }

  const btnFields=document.getElementById('btnToggleFields');
  const btnCheckout=document.getElementById('btnCheckout');
  if(cart.wing==='wholesale' && total<MIN_WHOLESALE){
    const rest=MIN_WHOLESALE-total;
    gateWrap.innerHTML=`<div class="wholesale-gate">
      <div class="wg-text">${T.gate_need[LANG].replace('{cur}',total).replace('{rest}',rest)} <a href="#" onclick="switchToRetailFromGate();return false;" style="color:var(--maroon);font-weight:800">${T.gate_switch[LANG]}</a></div>
      <div class="wg-bar"><div class="wg-fill" style="width:${Math.min(100,total/MIN_WHOLESALE*100)}%"></div></div>
    </div>`;
    btnFields.disabled=true;
  }else if(cart.wing==='wholesale' && total>=MIN_WHOLESALE){
    gateWrap.innerHTML=`<div class="wholesale-gate ok"><div class="wg-text">${T.gate_ok[LANG]}</div></div>`;
    btnFields.disabled=cart.items.length===0;
  }else{
    gateWrap.innerHTML='';
    btnFields.disabled=cart.items.length===0;
  }
  document.getElementById('cmFields').classList.remove('show');
  btnFields.style.display='block';
}

function switchToRetailFromGate(){
  cart.items=[];cart.wing=null;
  setWing('retail');
  document.getElementById('cartCount').textContent='0';
  renderCart();
  showToast(LANG==='ar'?'تم تفريغ السلة والانتقال لجناح التجزئة':'Cart cleared, switched to Retail Wing');
}
window.switchToRetailFromGate=switchToRetailFromGate;

function toggleFields(){
  document.getElementById('cmFields').classList.add('show');
  document.getElementById('btnToggleFields').style.display='none';
}
window.toggleFields=toggleFields;

function openCart(){
  renderCart();
  document.getElementById('cartModal').classList.add('open');
  document.getElementById('ov2').classList.add('show');
  document.body.style.overflow='hidden';
}
window.openCart=openCart;
function closeCart(){
  document.getElementById('cartModal').classList.remove('open');
  document.getElementById('ov2').classList.remove('show');
  document.body.style.overflow='';
}
window.closeCart=closeCart;

function checkout(){
  const total=cartTotal();
  if(cart.wing==='wholesale' && total<MIN_WHOLESALE){
    showToast(T.toast_gateblock[LANG]);return;
  }
  const wilaya=document.getElementById('cust-wilaya').value;
  const baladiya=document.getElementById('cust-baladiya').value.trim();
  const phone=document.getElementById('cust-phone').value.trim();
  const name=document.getElementById('cust-name').value.trim();
  if(!wilaya||!baladiya||!phone||!name){showToast(T.toast_needfields[LANG]);return;}

  const lines=cart.items.map(i=>{
    const p=PRODUCTS.find(pp=>pp.id===i.id);
    const price=cart.wing==='retail'?p.retail:p.wholesale;
    return LANG==='ar'
      ? `• ${p.name[LANG]} × ${i.qty} = ${price*i.qty} دج`
      : `• ${p.name[LANG]} × ${i.qty} = ${price*i.qty} DZD`;
  }).join('\n');

  const wingTxt=(cart.wing==='retail'?T.wing_retail:T.wing_wholesale)[LANG];
  const msg=LANG==='ar'?[
    '*🌿 طلب جديد — LAMSA للستكرات*','',
    `الجناح: ${wingTxt}`,'',
    '*👤 بيانات الزبون:*',`الاسم: ${name}`,`الهاتف: ${phone}`,`الولاية: ${wilaya}`,`البلدية: ${baladiya}`,'',
    '*📦 المنتجات:*',lines,'',
    `*💰 المجموع: ${total.toLocaleString('en-US')} دج*`
  ]:[
    '*🌿 New order — LAMSA Stickers*','',
    `Wing: ${wingTxt}`,'',
    '*👤 Customer:*',`Name: ${name}`,`Phone: ${phone}`,`Wilaya: ${wilaya}`,`Municipality: ${baladiya}`,'',
    '*📦 Products:*',lines,'',
    `*💰 Total: ${total.toLocaleString('en-US')} DZD*`
  ];
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg.join('\n'))}`,'_blank');
}
window.checkout=checkout;

function showToast(msg){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  w.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

/* ================= wilaya select ================= */
function renderWilayas(){
  const sel=document.getElementById('cust-wilaya');
  sel.innerHTML=`<option value="">${T.ph_wilaya[LANG]}</option>`+WILAYAS.map(w=>`<option value="${w}">${w}</option>`).join('');
}

/* ================= i18n apply ================= */
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(T[k]) el.innerHTML=T[k][LANG];
  });
  const html=document.getElementById('html-root');
  html.lang=LANG;html.dir=(LANG==='ar'?'rtl':'ltr');
  document.body.classList.toggle('lang-ar',LANG==='ar');
  document.body.classList.toggle('lang-en',LANG==='en');
  document.getElementById('lang-ar-btn').classList.toggle('on',LANG==='ar');
  document.getElementById('lang-en-btn').classList.toggle('on',LANG==='en');
  document.getElementById('cust-baladiya').placeholder=T.ph_baladiya[LANG];
  document.getElementById('cust-phone').placeholder=T.ph_phone[LANG];
  document.getElementById('cust-name').placeholder=T.ph_name[LANG];
  document.getElementById('wingNote').innerHTML=(WING==='retail'?T.wing_note_retail:T.wing_note_wholesale)[LANG];
  renderWilayas();
  renderProducts();
  renderCart();
}
function setLang(l){LANG=l;applyLang();}
window.setLang=setLang;

/* ================= init ================= */
applyLang();
</script>
